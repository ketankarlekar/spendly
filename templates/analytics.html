{% extends "base.html" %}

{% block title %}Analytics – Spendly{% endblock %}

{% block content %}
<div class="analytics-page">
    <div class="analytics-card">
        <div class="analytics-blob analytics-blob--tr"></div>
        <div class="analytics-blob analytics-blob--bl"></div>

        <div class="analytics-icon">
            <svg width="109" height="100" viewBox="0 0 109 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="109" height="100" rx="20" fill="#2c5a4c"/>
                <circle cx="54.5" cy="50" r="18" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
                <path d="M54.5 50 L54.5 32 A18 18 0 0 1 72.5 50 Z" fill="white"/>
                <circle cx="54.5" cy="50" r="3" fill="white"/>
            </svg>
        </div>

        <div class="analytics-badge">COMING SOON</div>

        <h1 class="analytics-heading">Advanced Analytics</h1>

        <p class="analytics-body">
            We're working on powerful insights and
            visualizations to help you understand your spending
            patterns better.
        </p>

        <div class="analytics-dots">
            <span class="analytics-dot analytics-dot--1"></span>
            <span class="analytics-dot analytics-dot--2"></span>
            <span class="analytics-dot analytics-dot--3"></span>
        </div>

        <p class="analytics-subtitle">We're crafting something special</p>
    </div>
</div>
{% endblock %}
