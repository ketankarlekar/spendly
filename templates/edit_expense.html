{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Edit Expense</h1>
      <p class="auth-subtitle">Update the details below.</p>
    </div>
    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="{{ url_for('edit_expense', id=expense['id']) }}">
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input class="form-input" type="number" id="amount" name="amount"
                 step="0.01" min="0.01" required
                 value="{{ amount or '' }}">
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select class="form-input" id="category" name="category" required>
            <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input class="form-input" type="date" id="date" name="date"
                 required value="{{ date or '' }}">
        </div>
        <div class="form-group">
          <label for="description">Description <span style="color:var(--border)">(optional)</span></label>
          <input class="form-input" type="text" id="description" name="description"
                 maxlength="200" value="{{ description or '' }}">
        </div>
        <button type="submit" class="btn-submit">Update Expense</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
